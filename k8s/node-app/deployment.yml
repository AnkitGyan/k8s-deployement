apiVersion: apps/v1
kind: Deployment

metadata:
  name: node-app

spec:
  replicas: 3

  selector:
    matchLabels:
      app: node-app

  template:
    metadata:
      labels:
        app: node-app

    spec:
      containers:
        - name: node-app
          image: ankitgyan/node-app:latest
          ports:
            - containerPort: 3000

          env:
            - name: POSTGRES_HOST
              value: postgres-service
            - name: POSTGRES_PASSWORD
              value: password

            - name: MONGO_HOST
              value: mongo-service

            - name: REDIS_HOST
              value: redis-service